version: 2
profile: lra-real-analysis-v2

edge_kinds:
  - implies
  - equivalent_to
  - specializes
  - uses
  - defines

relations:

# =========================================================
# Bounding
# =========================================================

  - from: UpperBound
    to: BoundedAbove
    kind: defines
    note: "BoundedAbove(A) is defined via existence of an upper bound."

  - from: LowerBound
    to: BoundedBelow
    kind: defines
    note: "BoundedBelow(A) is defined via existence of a lower bound."

  - from: BoundedAbove
    to: BoundedSet
    kind: defines

  - from: BoundedBelow
    to: BoundedSet
    kind: defines

  - from: UpperBound
    to: Supremum
    kind: defines

  - from: LowerBound
    to: Infimum
    kind: defines

  - from: NonemptySet
    to: LeastUpperBoundProperty
    kind: uses

  - from: BoundedAbove
    to: LeastUpperBoundProperty
    kind: uses

  - from: Supremum
    to: LeastUpperBoundProperty
    kind: uses

# =========================================================
# Sequences
# =========================================================

  - from: ConvergentSequence
    to: CauchySequence
    kind: implies
    note: "In every metric space, convergence implies the Cauchy property."

  - from: ConvergentSequence
    to: BoundedSequence
    kind: implies
    note: "For real sequences, every convergent sequence is bounded."

  - from: Subsequence
    to: HasConvergentSubsequence
    kind: defines

  - from: ConvergentSequence
    to: HasConvergentSubsequence
    kind: implies
    note: "A convergent sequence has a convergent subsequence."

  - from: MonotoneIncreasingSequence
    to: ConvergentSequence
    kind: implies
    context: "with boundedness in \mathbb{R}"
    note: "A bounded monotone increasing real sequence converges."

  - from: MonotoneDecreasingSequence
    to: ConvergentSequence
    kind: implies
    context: "with boundedness in \mathbb{R}"
    note: "A bounded monotone decreasing real sequence converges."

  - from: Eventually
    to: ConvergentSequence
    kind: uses
    note: "Tail formulations of convergence are naturally expressed through Eventually."

  - from: Eventually
    to: CauchySequence
    kind: uses
    note: "Tail formulations of the Cauchy property are naturally expressed through Eventually."

  - from: CauchySequence
    to: ConvergentSequence
    kind: equivalent_to
    context: "\mathbb{R}"
    note: "In \mathbb{R}, a sequence is Cauchy iff it converges."

  - from: CauchySequence
    to: CauchySequence
    kind: specializes
    specialization: "CauchySequence(x_n) -> CauchySequence(x_n, d)"
    note: "The unparameterized predicate is the default real-metric instance of the polymorphic version."

  - from: ConvergentSequence
    to: ConvergentSequence
    kind: specializes
    specialization: "ConvergentSequence(x_n, L) -> ConvergentSequence(x_n, L, d)"
    note: "The unparameterized predicate is the default real-metric instance of the polymorphic version."

# =========================================================
# Continuity
# =========================================================

  - from: FunctionLimit
    to: ContinuousAt
    kind: defines
    note: "ContinuousAt(f,c) is defined by FunctionLimit(f,c,f(c))."

  - from: ContinuousAt
    to: ContinuousOn
    kind: defines
    note: "ContinuousOn(f,A) is defined pointwise via ContinuousAt."

  - from: ContinuousOn
    to: UniformlyContinuous
    kind: implies
    context: "compact domain"
    note: "On compact sets, continuity implies uniform continuity."

  - from: FunctionLimit
    to: LeftLimit
    kind: specializes

  - from: FunctionLimit
    to: RightLimit
    kind: specializes

# =========================================================
# Metric / Topology
# =========================================================

  - from: MetricSpace
    to: OpenSet
    kind: uses

  - from: MetricSpace
    to: ClosedSet
    kind: uses

  - from: OpenSet
    to: InteriorPoint
    kind: defines

  - from: ClosedSet
    to: AdherentPoint
    kind: uses

  - from: InteriorPoint
    to: BoundaryPoint
    kind: uses

  - from: ExteriorPoint
    to: BoundaryPoint
    kind: uses

  - from: LimitPoint
    to: ClosedSet
    kind: implies
    note: "A set containing all of its limit points is closed."

  - from: Complete
    to: CauchySequence
    kind: uses
    note: "Completeness is formulated in terms of Cauchy sequences."

  - from: TotallyBounded
    to: Complete
    kind: uses
    context: "compactness characterizations"

# =========================================================
# Differentiation
# =========================================================

  - from: DerivativeAt
    to: DifferentiableAt
    kind: defines

  - from: DifferentiableAt
    to: ContinuousAt
    kind: implies
    note: "Differentiability at a point implies continuity at that point."

  - from: LocalMaximum
    to: DerivativeAt
    kind: uses
    context: "Fermat-type theorem"

  - from: LocalMinimum
    to: DerivativeAt
    kind: uses
    context: "Fermat-type theorem"

# =========================================================
# Linear Algebra
# Added for LADR (Axler, Linear Algebra Done Right, 4e)
# =========================================================

  - from: LinearlyIndependent
    to: Basis
    kind: defines
    note: "A basis is a linearly independent list that spans V (Axler 2.26)."

  - from: Spans
    to: Basis
    kind: defines
    note: "A basis must span V; both conditions together define a basis."

  - from: Basis
    to: Dimension
    kind: defines
    note: "dim V is the length of any basis of V. Well-defined by Axler 2.34."

  - from: FiniteDimensional
    to: Basis
    kind: uses
    note: "A space is finite-dimensional iff it has a finite spanning list; every finite-dimensional space has a basis (Axler 2.31)."

  - from: Dimension
    to: FiniteDimensional
    kind: uses
    note: "dim V is defined only for finite-dimensional spaces."

  - from: Subspace
    to: VectorSpace
    kind: specializes
    note: "Every subspace is itself a vector space with the inherited operations (Axler 1.34)."

  - from: DirectSum
    to: SumOfSubspaces
    kind: specializes
    note: "A direct sum is a sum of subspaces in which every element has a unique representation (Axler 1.41)."

  - from: LinearMap
    to: NullSpace
    kind: defines
    note: "null T = {v in V : Tv = 0}. The null space is a subspace of the domain (Axler 3.13)."

  - from: LinearMap
    to: Range
    kind: defines
    note: "range T = {Tv : v in V}. The range is a subspace of the codomain (Axler 3.18)."

  - from: NullSpace
    to: Injective
    kind: equivalent_to
    context: "null T = {0}"
    note: "T is injective iff null T = {0} (Axler 3.15)."

  - from: Range
    to: Surjective
    kind: equivalent_to
    context: "range T = W"
    note: "T is surjective iff range T equals the codomain (Axler 3.19)."

  - from: Injective
    to: Isomorphism
    kind: uses
    note: "An isomorphism is a bijective linear map; injectivity is one half of the bijectivity condition."

  - from: Surjective
    to: Isomorphism
    kind: uses
    note: "An isomorphism is a bijective linear map; surjectivity is the other half."

  - from: NullSpace
    to: Dimension
    kind: uses
    context: "rank-nullity theorem"
    note: "Fundamental theorem of linear maps: dim V = dim null T + dim range T (Axler 3.21)."

  - from: Range
    to: Dimension
    kind: uses
    context: "rank-nullity theorem"
    note: "Fundamental theorem of linear maps: dim V = dim null T + dim range T (Axler 3.21)."

  - from: Basis
    to: LinearlyIndependent
    kind: implies
    note: "Every basis is linearly independent by definition."

  - from: Basis
    to: Spans
    kind: implies
    note: "Every basis spans V by definition."

  - from: IsomorphicVectorSpaces
    to: Dimension
    kind: equivalent_to
    context: "finite-dimensional spaces over same field"
    note: "Two finite-dimensional vector spaces over the same field are isomorphic iff they have the same dimension (Axler 3D)."

  - from: LinearlyDependent
    to: LinearlyIndependent
    kind: equivalent_to
    note: "LinearlyDependent is the negation of LinearlyIndependent (Axler 2.17)."
