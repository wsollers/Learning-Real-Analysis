  optional_arguments: []

- id: pred:injective
  name: Injective
  category: function-structure
  arity: 1
  arguments: [f]
  optional_arguments: []
  aliases: [OneToOne]
  formal: \forall x,y\; (f(x)=f(y) \rightarrow x=y)

- id: pred:surjective
  name: Surjective
  category: function-structure
  arity: 1
  arguments: [f]
  optional_arguments: [B]
  aliases: [Onto]
  formal: \forall y \in B \; \exists x \; (f(x)=y)

- id: pred:bijective
  name: Bijective
  category: function-structure
  arity: 1
  arguments: [f]
  optional_arguments: [B]
  formal: Injective(f) \land Surjective(f,B)

- id: pred:inverse-function
  name: InverseFunction
  category: inverse-functions
  arity: 2
  arguments: [f, g]
  optional_arguments: []
  formal: g\circ f = \operatorname{id} \land f\circ g = \operatorname{id}

- id: pred:monotone-function
