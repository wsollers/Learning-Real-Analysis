# =========================================================
# Limits
# =========================================================

- id: pred:function-limit
  name: FunctionLimit
  category: limit
  arity: 3
  arguments: [f, c, L]
  optional_arguments: [d_dom, d_cod]
  signature: FunctionLimit(f, c, L [, d_dom, d_cod])
  formal: \forall \varepsilon > 0 \; \exists \delta > 0 \; \forall x \; (0 < |x-c| < \delta \rightarrow |f(x)-L| < \varepsilon)

- id: pred:left-limit
  name: LeftLimit
  category: limit
  arity: 3
