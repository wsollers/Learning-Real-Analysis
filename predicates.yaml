# =========================================================
# Nested Intervals / Intersection Properties
# =========================================================

- id: pred:nested-interval-sequence
  name: NestedIntervalSequence
  category: compactness
  arity: 1
  arguments: [I_n]
  optional_arguments: []
  formal: \forall n \in \mathbb{N} \; (I_{n+1} \subseteq I_n)
  note: >
    Used for sequences of intervals, typically closed intervals in \mathbb{R}.
    The interval structure itself should be stated in the surrounding theorem or definition
    unless a more specialized predicate is later introduced.

- id: pred:nonempty-intersection
  name: NonemptyIntersection
  category: compactness
  arity: 1
  arguments: [I_n]
  optional_arguments: []
  formal: \exists x \; \forall n \in \mathbb{N} \; (x \in I_n)
  note: >
    Canonical conclusion predicate for families or sequences of sets with nonempty total intersection.

