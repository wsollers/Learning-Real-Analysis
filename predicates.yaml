version: 4
profile: lra-real-analysis-v2
design:
  polymorphic_predicates: true
  no_duplicate_semantics: true
  canonical_names_required: true
  context_in_arguments: true
  optional_parameter_convention: true
  optional_parameter_examples:
  - CauchySequence(x_n [, d])
  - ConvergentSequence(x_n, L [, d])
  - FunctionLimit(f, c, L [, d_dom, d_cod])
  - ContinuousAt(f, c [, d_dom, d_cod])
  - LimitPoint(x, A [, M, d])
predicates:

# =========================================================
# Order / Set Structure
# =========================================================

- id: pred:nonempty-set
  name: NonemptySet
  category: order
  arity: 1
  arguments: [S]
  optional_arguments: []
  formal: S \neq \varnothing

- id: pred:subset
  name: Subset
  category: order
  arity: 2
  arguments: [A, S]
  optional_arguments: []
  formal: A \subseteq S

# =========================================================
# Intervals
# =========================================================

- id: pred:closed-interval
  name: ClosedInterval
  category: order
  arity: 2
  arguments: [a, b]
  optional_arguments: []
  formal: \{x \in \mathbb{R} : a \le x \le b\}
  note: The closed interval [a,b] as a set predicate.

- id: pred:open-interval
  name: OpenInterval
  category: order
  arity: 2
  arguments: [a, b]
  optional_arguments: []
  formal: \{x \in \mathbb{R} : a < x < b\}

# =========================================================
# Bounding
# =========================================================

- id: pred:least-upper-bound-property-in
  name: LeastUpperBoundProperty
  category: completeness
  arity: 1
  arguments: [S]
  optional_arguments: []
  formal: \forall A \; ((A \subseteq S \land NonemptySet(A) \land BoundedAbove(A)) \rightarrow \exists s \in S \; Supremum(s,A))
  note: >
    General ambient-set version of the least upper bound property.
    This is order-theoretic completeness for an ambient ordered system S.
    Use this predicate for statements such as LeastUpperBoundProperty(S).
    Keep the existing 0-ary LeastUpperBoundProperty for the specialized assertion
    that the default real-analysis ambient system \mathbb{R} has the least upper bound property.

- id: pred:upper-bound
  name: UpperBound
  category: bounding
  arity: 2
  arguments: [u, A]
  optional_arguments: []
  formal: \forall x \in A \; (x \le u)

- id: pred:lower-bound
  name: LowerBound
  category: bounding
  arity: 2
  arguments: [l, A]
  optional_arguments: []
  formal: \forall x \in A \; (l \le x)

- id: pred:bounded-above
  name: BoundedAbove
  category: bounding
  arity: 1
  arguments: [A]
  optional_arguments: []
  formal: \exists u \; UpperBound(u, A)

- id: pred:bounded-below
  name: BoundedBelow
  category: bounding
  arity: 1
  arguments: [A]
  optional_arguments: []
  formal: \exists l \; LowerBound(l, A)

- id: pred:bounded-set
  name: BoundedSet
  category: bounding
  arity: 1
  arguments: [A]
  optional_arguments: []
  formal: BoundedAbove(A) \land BoundedBelow(A)

- id: pred:maximum
  name: Maximum
  category: bounding
  arity: 2
  arguments: [m, A]
  optional_arguments: []
  formal: (m \in A) \land \forall x \in A \; (x \le m)

- id: pred:minimum
  name: Minimum
  category: bounding
  arity: 2
  arguments: [m, A]
  optional_arguments: []
  formal: (m \in A) \land \forall x \in A \; (m \le x)

- id: pred:supremum
  name: Supremum
  category: completeness
  arity: 2
  arguments: [s, A]
  optional_arguments: []
  formal: UpperBound(s,A) \land \forall u \; (UpperBound(u,A) \rightarrow s \le u)

- id: pred:infimum
  name: Infimum
  category: completeness
  arity: 2
  arguments: [t, A]
  optional_arguments: []
  formal: LowerBound(t,A) \land \forall l \; (LowerBound(l,A) \rightarrow l \le t)

# =========================================================
# Tolerance / Proximity
# =========================================================
#
# These three predicates are the primitive metric ingredients
# of every epsilon-delta argument. They compose to give the
# standard readings for limits, continuity, and uniform
# continuity without repeating the raw inequality syntax.
#
#   Within(x, c, r)         -- x lies within radius r of c
#                              (the ball condition, input or output)
#
#   InputTolerance(x, c, delta)  -- x is a valid input:
#                              strictly within delta of c,
#                              but x != c  (the punctured condition)
#
#   OutputTolerance(y, L, eps)   -- y is an acceptable output:
#                              within eps of the target L
#
# Usage pattern (function limit):
#
#   FunctionLimit(f, c, L)
#   :=  forall eps > 0,
#       exists delta > 0,
#       forall x in A :
#       InputTolerance(x, c, delta)  ->  OutputTolerance(f(x), L, eps)
#
# =========================================================

- id: pred:within
  name: Within
  category: tolerance
  arity: 3
  arguments: [x, c, r]
  optional_arguments: []
  formal: |x - c| < r
  note: >
    General proximity predicate. x lies strictly within radius r of
    center c. Used for both input and output conditions when the
    punctured (x != c) distinction is not required. In metric space
    contexts, replace |x - c| with d(x, c).

- id: pred:input-tolerance
  name: InputTolerance
  category: tolerance
  arity: 3
  arguments: [x, c, \delta]
  optional_arguments: []
  formal: 0 < |x - c| < \delta
  note: >
    Punctured proximity predicate for limit arguments. Asserts that
    x is within delta of c but is not equal to c. This is the
    standard input condition in epsilon-delta definitions of function
    limits. Contrast with Within(x, c, delta) which permits x = c
    and is the correct input condition for continuity (where x = c
    is allowed).

- id: pred:output-tolerance
  name: OutputTolerance
  category: tolerance
  arity: 3
  arguments: [y, L, \varepsilon]
  optional_arguments: []
  formal: |y - L| < \varepsilon
  note: >
    Output approximation predicate. Asserts that y is within
    varepsilon of the target value L. This is the standard output
    condition in all epsilon-delta arguments. When y = f(x), the
    reading is: the output f(x) is within the prescribed tolerance
    varepsilon of the limit L.

# =========================================================
# Completeness
# =========================================================

- id: pred:least-upper-bound-property
  name: LeastUpperBoundProperty
  category: completeness
  arity: 0
  arguments: []
  optional_arguments: []
  formal: \forall A \subseteq \mathbb{R} \; ((NonemptySet(A) \land BoundedAbove(A)) \rightarrow \exists s \; Supremum(s,A))

- id: pred:archimedean-property
  name: ArchimedeanProperty
  category: completeness
  arity: 0
  arguments: []
  optional_arguments: []
  formal: \forall x \in \mathbb{R} \; \exists n \in \mathbb{N} \; (n > x)

- id: pred:dense-subset
  name: DenseSubset
  category: dense
  arity: 2
  arguments: [D, S]
  optional_arguments: []
  formal: \forall x \in S \; \forall \varepsilon > 0 \; \exists d \in D \; (d(x,d) < \varepsilon)

- id: pred:well-ordering-principle
  name: WellOrderingPrinciple
  category: order
  arity: 0
  arguments: []
  optional_arguments: []
  formal: \forall A\;((A \subseteq \mathbb{N} \land \exists a\,(a \in A)) \Rightarrow \exists m\,(m \in A \land \forall a\,(a \in A \Rightarrow m \le a)))

# =========================================================
# Sequences
# =========================================================

- id: pred:strictly-increasing-function
  name: StrictlyIncreasing
  category: sequence
  arity: 1
  arguments: [\sigma]
  optional_arguments: []
  formal: \forall k, \ell \in \mathbb{N} \; (k < \ell \rightarrow \sigma(k) < \sigma(\ell))
  note: Used for index maps in subsequence definitions.

- id: pred:sequence
  name: Sequence
  category: sequence
  arity: 2
  arguments: [x_n, X]
  optional_arguments: []
  formal: x : \mathbb{N} \to X
  note: >
    Canonical form requires ambient space X.
    Do NOT use bare Sequence(x_n) without space context.

- id: pred:subsequence
  name: Subsequence
  category: subsequence
  arity: 2
  arguments: [x_{n_k}, x_n]
  optional_arguments: []
  formal: \exists \sigma \; (StrictlyIncreasing(\sigma) \land \forall k \in \mathbb{N} \; (x_{n_k} = x_{\sigma(k)}))

- id: pred:convergent-sequence
  name: ConvergentSequence
  category: sequence
  arity: 2
  arguments: [x_n, L]
  optional_arguments: [d]
  signature: ConvergentSequence(x_n, L [, d])
  formal: \forall \varepsilon > 0 \; \exists N \in \mathbb{N} \; \forall n \ge N \; (|x_n - L| < \varepsilon)

- id: pred:divergent-sequence
  name: DivergentSequence
  category: sequence
  arity: 1
  arguments: [x_n]
  optional_arguments: [d]
  signature: DivergentSequence(x_n [, d])

- id: pred:bounded-sequence
  name: BoundedSequence
  category: sequence
  arity: 1
  arguments: [x_n]
  optional_arguments: []
  formal: \exists M > 0 \; \forall n \in \mathbb{N} \; (|x_n| \le M)

- id: pred:cauchy-sequence
  name: CauchySequence
  category: cauchy
  arity: 1
  arguments: [x_n]
  optional_arguments: [d]
  signature: CauchySequence(x_n [, d])
  formal: \forall \varepsilon > 0 \; \exists N \in \mathbb{N} \; \forall m,n \ge N \; (|x_n - x_m| < \varepsilon)

- id: pred:monotone-increasing-sequence
  name: MonotoneIncreasingSequence
  category: monotone
  arity: 1
  arguments: [x_n]
  optional_arguments: []
  aliases: [NondecreasingSequence]
  formal: \forall n \in \mathbb{N} \; (x_n \le x_{n+1})

- id: pred:monotone-decreasing-sequence
  name: MonotoneDecreasingSequence
  category: monotone
  arity: 1
  arguments: [x_n]
  optional_arguments: []
  aliases: [NonincreasingSequence]
  formal: \forall n \in \mathbb{N} \; (x_{n+1} \le x_n)

- id: pred:eventually
  name: Eventually
  category: sequence
  arity: 2
  arguments: [x_n, P]
  optional_arguments: []
  formal: \exists N \in \mathbb{N} \; \forall n \ge N \; P(n)

- id: pred:frequently
  name: Frequently
  category: sequence
  arity: 2
  arguments: [x_n, P]
  optional_arguments: []
  formal: \forall N \in \mathbb{N} \; \exists n \ge N \; P(n)

- id: pred:has-convergent-subsequence
  name: HasConvergentSubsequence
  category: subsequence
  arity: 1
  arguments: [x_n]
  optional_arguments: [d]

- id: pred:limsup-sequence
