  optional_arguments: []
  formal: \forall n \in \mathbb{N} \; (I_{n+1} \subseteq I_n)
  note: >
    Used for sequences of intervals, typically closed intervals in \mathbb{R}.
    The interval structure itself should be stated in the surrounding theorem or definition
    unless a more specialized predicate is later introduced.

- id: pred:nonempty-intersection
