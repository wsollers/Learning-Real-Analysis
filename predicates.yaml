  optional_arguments: []

# =========================================================
# Continuity
# =========================================================

- id: pred:continuous-at
  name: ContinuousAt
  category: continuity
  arity: 2
  arguments: [f, c]
  optional_arguments: [d_dom, d_cod]
  signature: ContinuousAt(f, c [, d_dom, d_cod])
  formal: FunctionLimit(f,c,f(c))

- id: pred:continuous-on
  name: ContinuousOn
  category: continuity
  arity: 2
  arguments: [f, A]
  optional_arguments: [d_dom, d_cod]
  signature: ContinuousOn(f, A [, d_dom, d_cod])
  formal: \forall c \in A \; ContinuousAt(f,c)

- id: pred:uniformly-continuous
  name: UniformlyContinuous
  category: uniform-continuity
  arity: 2
  arguments: [f, A]
  optional_arguments: [d_dom, d_cod]
  signature: UniformlyContinuous(f, A [, d_dom, d_cod])
  formal: \forall \varepsilon > 0 \; \exists \delta > 0 \; \forall x,y \in A \; (|x-y|<\delta \rightarrow |f(x)-f(y)|<\varepsilon)

- id: pred:lipschitz
  name: Lipschitz
  category: continuity
  arity: 3
  arguments: [f, A, K]
  optional_arguments: [d_dom, d_cod]
  signature: Lipschitz(f, A, K [, d_dom, d_cod])
  formal: \forall x,y \in A \; (d(f(x),f(y)) \le K \, d(x,y))

- id: pred:bilipschitz
  name: BiLipschitz
  category: continuity
  arity: 4
  arguments: [f, A, c, K]
  optional_arguments: [d_dom, d_cod]

