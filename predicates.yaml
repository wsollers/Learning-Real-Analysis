# =========================================================
# Limits
# =========================================================

- id: pred:function-limit
  name: FunctionLimit
  category: limit
  arity: 3
  arguments: [f, c, L]
  optional_arguments: [d_dom, d_cod]
  signature: FunctionLimit(f, c, L [, d_dom, d_cod])
  formal: >
    \forall\,\operatorname{OutputTolerance}(\varepsilon),\;
    \exists\,\operatorname{InputTolerance}(\delta),\;
    \forall x \in A :\;
    \operatorname{InputTolerance}(x, c, \delta)
    \;\Rightarrow\;
    \operatorname{OutputTolerance}(f(x), L, \varepsilon)
  note: >
    Quantifiers are typed: OutputTolerance(eps) names the demanded
    precision; InputTolerance(delta) names the responding tolerance.
    The input condition is punctured (0 < |x-c| < delta), distinguishing
    this from ContinuousAt where Within(x, c, delta) permits x = c.

- id: pred:left-limit
  name: LeftLimit
  category: limit
  arity: 3
  arguments: [f, c, L]
  optional_arguments: []

- id: pred:right-limit
  name: RightLimit
  category: limit
  arity: 3
  arguments: [f, c, L]
  optional_arguments: []

- id: pred:infinite-limit-at-point
  name: InfiniteLimitAtPoint
  category: limit
  arity: 3
  arguments: [f, c, sign]
  optional_arguments: []

- id: pred:limit-at-infinity
  name: LimitAtInfinity
  category: limit
  arity: 3
  arguments: [f, direction, L]
  optional_arguments: []

# =========================================================
# Continuity
# =========================================================

- id: pred:continuous-at
  name: ContinuousAt
  category: continuity
  arity: 2
  arguments: [f, c]
  optional_arguments: [d_dom, d_cod]
  signature: ContinuousAt(f, c [, d_dom, d_cod])
  formal: >
    \forall\,\operatorname{OutputTolerance}(\varepsilon),\;
    \exists\,\operatorname{InputTolerance}(\delta),\;
    \forall x \in A :\;
    \operatorname{Within}(x, c, \delta)
    \;\Rightarrow\;
    \operatorname{OutputTolerance}(f(x), f(c), \varepsilon)
  note: >
    Input condition is Within (not InputTolerance): x = c is permitted.
    This is the key structural difference from FunctionLimit, where
    the input condition is punctured. ContinuousAt = FunctionLimit
    with target f(c) and unpunctured input condition.

- id: pred:continuous-on
  name: ContinuousOn
  category: continuity
  arity: 2
  arguments: [f, A]
  optional_arguments: [d_dom, d_cod]
  signature: ContinuousOn(f, A [, d_dom, d_cod])
  formal: \forall c \in A \; ContinuousAt(f,c)

- id: pred:uniformly-continuous
  name: UniformlyContinuous
  category: uniform-continuity
  arity: 2
  arguments: [f, A]
  optional_arguments: [d_dom, d_cod]
  signature: UniformlyContinuous(f, A [, d_dom, d_cod])
  formal: >
    \forall\,\operatorname{OutputTolerance}(\varepsilon),\;
    \exists\,\operatorname{InputTolerance}(\delta),\;
    \forall x, u \in A :\;
    \operatorname{Within}(x, u, \delta)
    \;\Rightarrow\;
    \operatorname{OutputTolerance}(f(x), f(u), \varepsilon)
  note: >
    Both x and u range over A with Within (unpunctured): no base point,
    no exclusion of x = u. The single delta responds to eps across all
    pairs simultaneously — this is the global-vs-pointwise distinction
    from ContinuousOn, where delta may depend on c.

- id: pred:lipschitz
  name: Lipschitz
  category: continuity
  arity: 3
  arguments: [f, A, K]
  optional_arguments: [d_dom, d_cod]
  signature: Lipschitz(f, A, K [, d_dom, d_cod])
  formal: \forall x,y \in A \; (d(f(x),f(y)) \le K \, d(x,y))

- id: pred:bilipschitz
  name: BiLipschitz
  category: continuity
  arity: 4
  arguments: [f, A, c, K]
  optional_arguments: [d_dom, d_cod]

