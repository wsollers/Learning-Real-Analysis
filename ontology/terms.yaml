version: 1
terms:
  - id: term:interval-open
    name: OpenInterval
    kind: constructor
    category: interval
    arguments: [a, b]
    returns: set
    notation: '(a,b)'

  - id: term:interval-closed
    name: ClosedInterval
    kind: constructor
    category: interval
    arguments: [a, b]
    returns: set
    notation: '[a,b]'

  - id: term:interval-half-open-left
    name: HalfOpenIntervalLeft
    kind: constructor
    category: interval
    arguments: [a, b]
    returns: set
    notation: '[a,b)'

  - id: term:interval-half-open-right
    name: HalfOpenIntervalRight
    kind: constructor
    category: interval
    arguments: [a, b]
    returns: set
    notation: '(a,b]'

  - id: term:right-ray-open
    name: OpenRightRay
    kind: constructor
    category: interval
    arguments: [a]
    returns: set
    notation: '(a,\infty)'

  - id: term:right-ray-closed
    name: ClosedRightRay
    kind: constructor
    category: interval
    arguments: [a]
    returns: set
    notation: '[a,\infty)'

  - id: term:left-ray-open
    name: OpenLeftRay
    kind: constructor
    category: interval
    arguments: [b]
    returns: set
    notation: '(-\infty,b)'

  - id: term:left-ray-closed
    name: ClosedLeftRay
    kind: constructor
    category: interval
    arguments: [b]
    returns: set
    notation: '(-\infty,b]'

  - id: term:open-ball
    name: OpenBall
    kind: constructor
    category: metric
    arguments: [x, r]
    optional_arguments: [M, d]
    returns: set
    notation: 'B_r(x)'

  - id: term:closed-ball
    name: ClosedBall
    kind: constructor
    category: metric
    arguments: [x, r]
    optional_arguments: [M, d]
    returns: set
    notation: '\overline{B}_r(x)'

  - id: term:epsilon-neighborhood
    name: EpsilonNeighborhood
    kind: constructor
    category: topology
    arguments: [c, \varepsilon]
    optional_arguments: [X, tau]
    returns: set
    notation: 'V_\varepsilon(c)'

  - id: term:deleted-epsilon-neighborhood
    name: DeletedEpsilonNeighborhood
    kind: constructor
    category: topology
    arguments: [c, \varepsilon]
    optional_arguments: [X, tau]
    returns: set
    notation: 'V_\varepsilon(c)\setminus\{c\}'

  - id: term:relative-neighborhood
    name: RelativeNeighborhood
    kind: constructor
    category: topology
    arguments: [A, c, \varepsilon]
    optional_arguments: [X, tau]
    returns: set
    notation: 'A \cap V_\varepsilon(c)'

  - id: term:sequence-tail
    name: SequenceTail
    kind: constructor
    category: sequence-tail
    arguments: [x_n, M]
    returns: sequence
    notation: '(x_n)_{n \ge M}'

  - id: term:input-separation
    name: InputSeparation
    kind: derived_quantity
    category: metric-change
    arguments: [x, u]
    optional_arguments: [d_dom]
    returns: nonnegative_real
    formal: '|x-u|'

  - id: term:output-variation
    name: OutputVariation
    kind: derived_quantity
    category: metric-change
    arguments: [f, x, u]
    optional_arguments: [d_cod]
    returns: nonnegative_real
    formal: '|f(x)-f(u)|'

  - id: term:target-variation
    name: TargetVariation
    kind: derived_quantity
    category: metric-change
    arguments: [f, x, L]
    optional_arguments: [d_cod]
    returns: nonnegative_real
    formal: '|f(x)-L|'

  - id: term:partition
    name: Partition
    kind: structured_object
    category: integration
    arguments: [P, I]
    returns: object

  - id: term:tagged-partition
    name: TaggedPartition
    kind: structured_object
    category: integration
    arguments: [P, T, I]
    returns: object

  - id: term:mesh-of-partition
    name: MeshOfPartition
    kind: derived_quantity
    category: integration
    arguments: [P]
    returns: nonnegative_real

  - id: term:upper-sum
    name: UpperSum
    kind: derived_quantity
    category: integration
    arguments: [f, P]
    returns: real

  - id: term:lower-sum
    name: LowerSum
    kind: derived_quantity
    category: integration
    arguments: [f, P]
    returns: real
