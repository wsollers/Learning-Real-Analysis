tex_rewrites:
  - description: Rename legacy continuity predicate
    find: '\operatorname{UniformlyContinuous}'
    replace: '\operatorname{UniformlyContinuousOn}'
  - description: Rename DenseSubset to DenseIn
    find: '\operatorname{DenseSubset}'
    replace: '\operatorname{DenseIn}'
  - description: Mark Eventually as operator
    find: '\operatorname{Eventually}'
    replace: '\operatorname{Eventually}'
    new_kind: operator
  - description: Mark Frequently as operator
    find: '\operatorname{Frequently}'
    replace: '\operatorname{Frequently}'
    new_kind: operator
  - description: Mark ClosedInterval as term constructor
    find: '\operatorname{ClosedInterval}'
    replace: '\operatorname{ClosedInterval}'
    new_kind: term
  - description: Mark OpenInterval as term constructor
    find: '\operatorname{OpenInterval}'
    replace: '\operatorname{OpenInterval}'
    new_kind: term
  - description: Remove rejected neighborhood convergence predicate
    find: '\operatorname{NeighborhoodConvergentSequence}'
    replace: '\operatorname{ConvergentSequence}'
    new_kind: predicate
  - description: Mark InputSeparation as term
    find: '\operatorname{InputSeparation}'
    replace: '\operatorname{InputSeparation}'
    new_kind: term
  - description: Mark OutputVariation as term
    find: '\operatorname{OutputVariation}'
    replace: '\operatorname{OutputVariation}'
    new_kind: term
  - description: Mark TargetVariation as term
    find: '\operatorname{TargetVariation}'
    replace: '\operatorname{TargetVariation}'
    new_kind: term

explorer_generation:
  preserve_legacy_def_ids: true
  preserve_theorem_node_ids: true
  flatten_edge_kinds_to: depends_on
  emit_legacy_titles_from_canonical_names: true
