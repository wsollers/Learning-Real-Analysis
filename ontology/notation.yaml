version: 1

defaults:
  sets:
    ambient: S
    subset: A
    second_subset: B
  points:
    point: x
    second_point: y
    distinguished: c
  bounds:
    upper: u
    lower: l
    supremum: s
    infimum: t
    maximum: M
    minimum: m
  sequences:
    sequence: x_n
    second_sequence: y_n
    subsequence: x_{n_k}
    limit: L
  functions:
    function: f
    second_function: g
    third_function: h
    sequence_of_functions: f_n
    limit_function: F
    lipschitz_constant: K
    input_separation: \rho
    output_variation: \omega
  integration:
    interval: I
    partition: P
    refinement: Q
    tagged_partition: (P,T)
    mesh: \|P\|
    upper_sum: U(f,P)
    lower_sum: L(f,P)
    integral_value: L

rendering:
  epsilon: \varepsilon
  delta: \delta
  use_geq_for_indices: true
  canonical_operator_macro: \operatorname
  optional_argument_style: bracketed
  open_ball: B_r(x)
  closed_ball: \overline{B}_r(x)
  closed_interval: "[a,b]"
  open_interval: (a,b)
  half_open_left: "[a,b)"
  half_open_right: (a,b]
  input_separation: '\operatorname{InputSeparation}'
  output_variation: '\operatorname{OutputVariation}'
  target_variation: '\operatorname{TargetVariation}'
